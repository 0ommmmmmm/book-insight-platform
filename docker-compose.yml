version: "3.9"

# Quick start: docker compose up -d
# Then: docker compose exec backend python manage.py migrate
#        docker compose exec backend python manage.py loaddata books/fixtures/sample_books.json

services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: book_insight
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: book_insight
      DB_USER: bookuser
      DB_PASSWORD: bookpassword
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    environment:
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: book_insight
      DB_USER: bookuser
      DB_PASSWORD: bookpassword
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
    depends_on:
      - backend
      - redis

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  mysql_data:
  chroma_data:
